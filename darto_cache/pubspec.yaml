name: darto_cache
description: Cache primitives for Darto — a tiny Cache interface with a zero-dep MemoryCache (LRU + TTL) and a RedisCache adapter for shared/distributed caching.
version: 1.0.0
homepage: https://github.com/evandersondev/darto/tree/main/darto_cache
repository: https://github.com/evandersondev/darto

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  redis: ^4.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0
