name: darto_cli
description: Official CLI for the Darto framework — scaffold projects, generate
  modules, run dev server.
version: 1.0.0
homepage: https://github.com/evandersondev/darto
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  args: ^2.5.0
  path: ^1.9.1
  watcher: ^1.1.0
  darto:
    path: ../darto

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0

executables:
  darto: darto
