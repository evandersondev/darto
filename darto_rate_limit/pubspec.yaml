name: darto_rate_limit
description: Distributed RateLimitStore backends for Darto — RedisRateLimitStore plugs into the core rateLimit() middleware to share counters across instances.
version: 1.0.0
homepage: https://github.com/evandersondev/darto/tree/main/darto_rate_limit
repository: https://github.com/evandersondev/darto

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  darto: ^1.2.0
  redis: ^4.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0

# Local dev against this monorepo's darto.  Ignored by consumers of the
# published package.
dependency_overrides:
  darto:
    path: ../darto
