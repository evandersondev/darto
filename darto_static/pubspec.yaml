name: darto_static
description: Static file serving middleware for Darto.
version: 1.0.2
homepage: https://github.com/evandersondev/darto/tree/main/darto_static
repository: https://github.com/evandersondev/darto

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  crypto: ^3.0.7
  darto: ^1.2.0
  mime: ^2.0.0
  path: ^1.9.1

dev_dependencies:
  darto_test: ^1.1.0
  lints: ^5.0.0
  test: ^1.24.0

# Local dev against the monorepo's darto. Ignored by consumers of the
# published package.
dependency_overrides:
  darto:
    path: ../darto
  darto_test:
    path: ../darto_test
