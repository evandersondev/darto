name: darto_test
description: Ergonomic test client for the Darto web framework — boot an app on an ephemeral port and assert responses without managing a server.
version: 1.1.0
homepage: https://github.com/evandersondev/darto/tree/main/darto_test
repository: https://github.com/evandersondev/darto

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  darto: ^1.2.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0

# Local development against this monorepo's darto. Ignored by consumers of the
# published package.
dependency_overrides:
  darto:
    path: ../darto
