name: darto_ws
description: WebSocket plugin for Darto — route-integrated, same port, Hono-style. Rooms, broadcast and Redis pub/sub for multi-instance fanout.
version: 1.1.0
homepage: https://github.com/evandersondev/darto/tree/main/darto_ws
repository: https://github.com/evandersondev/darto

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  darto: ^1.2.0
  redis: ^4.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0

# Local dev against this monorepo's darto.  Ignored by consumers of the
# published package.
dependency_overrides:
  darto:
    path: ../darto
