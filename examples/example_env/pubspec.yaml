name: example_env
description: Darto v2 — environment variables example
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  darto:
    path: ../../darto
  darto_env:
    path: ../../darto_env

dev_dependencies:
  lints: ^5.0.0

# Plugins pin `darto` from hosted; force-resolve to the in-repo path.
dependency_overrides:
  darto:
    path: ../../darto
