name: example_middleware_validator
description: Darto v2 — zValidator middleware example (schema-driven validation with zard)
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  darto:
    path: ../../darto
  darto_validator:
    path: ../../darto_validator

dev_dependencies:
  lints: ^5.0.0

# Force the local path packages so darto_validator's hosted `darto: ^1.0.0`
# constraint resolves to this monorepo's darto instead of a pub.dev release.
dependency_overrides:
  darto:
    path: ../../darto
  darto_validator:
    path: ../../darto_validator
