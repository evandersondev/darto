name: example_validator
description: Darto v2 — generic validator() middleware example (bring your own logic)
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  darto:
    path: ../../darto
  zard: ^1.1.2

dev_dependencies:
  lints: ^5.0.0

# Force the local path packages so darto_validator's hosted `darto: ^1.0.0`
# constraint resolves to this monorepo's darto instead of a pub.dev release.
dependency_overrides:
  darto:
    path: ../../darto
  zard:
    path: ../../../zard
