name: manual_api
description: A sample command-line application.
version: 1.0.0
publish_to: none
# repository: https://github.com/my_org/my_repo

environment:
  sdk: ^3.11.4

# Add regular dependencies here.
dependencies:
  darto:
    path: ../../darto
  darto_env:
    path: ../../darto_env

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

# Plugins pin `darto` from hosted; force-resolve to the in-repo path.
dependency_overrides:
  darto:
    path: ../../darto
